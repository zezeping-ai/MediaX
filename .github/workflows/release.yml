name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Tauri updater key notes (for future key rotation):
      # 1) Generate a new key pair locally:
      #    pnpm tauri signer generate -w src-tauri/keys/updater.key
      # 2) Copy the public key string from:
      #    src-tauri/keys/updater.key.pub
      #    Then update `src-tauri/tauri.conf.json` -> `plugins.updater.pubkey`.
      # 3) Copy the private key content from:
      #    src-tauri/keys/updater.key
      #    Then update repository secret `TAURI_SIGNING_PRIVATE_KEY` with the new value.
      #    If the key is encrypted, also set `TAURI_SIGNING_PRIVATE_KEY_PASSWORD`.
      # 4) Commit the updated `tauri.conf.json` and workflow, then create a new release tag.
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: "mediax-updater-2026"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MediaX ${{ github.ref_name }}"
          releaseBody: "Automated release for ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
